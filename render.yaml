services:
  - type: web
    name: cyber-commission
    env: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: SECRET_KEY
        fromSecret: SECRET_KEY

      - key: EMAIL_SENDER
        fromSecret: EMAIL_SENDER

      - key: EMAIL_PASSWORD
        fromSecret: EMAIL_PASSWORD

      - key: EMAIL_RECEIVER
        fromSecret: EMAIL_RECEIVER
